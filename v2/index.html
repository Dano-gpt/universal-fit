<style>
  :root{--blue:#9EFF3D;--blue2:#B7FF6E;--green:#6EE23A;--amber:#FFC24B;--red:#FF5A6E;--bg:#0A0A16;--card:#151528;--ink:#ECEBFF;--muted:#8A88B8;--line:#2A2A4D;--hero:#2A1145;--headerbg:#10102A;--accink:#0A0A16;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:'Nunito',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);}
  .app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;}
  header{background:var(--blue);color:#fff;padding:12px 16px 0;position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;justify-content:space-between;}
  .brand h1{font-size:17px;margin:0;font-weight:900;}
  .brand .demo{font-size:10px;opacity:.9;background:rgba(255,255,255,.2);padding:3px 7px;border-radius:20px;font-weight:800;}
  .roles{display:flex;gap:6px;margin-top:10px;}
  .roles button{flex:1;background:transparent;border:none;color:rgba(255,255,255,.75);font-size:13px;font-weight:800;padding:9px 0;border-bottom:3px solid transparent;cursor:pointer;}
  .roles button.on{color:#fff;border-color:#fff;}
  .idbar{background:#37464f;color:#e6ecf0;font-size:12px;padding:7px 16px;display:flex;align-items:center;gap:8px;}
  .idbar select{background:#fff;color:var(--ink);border:none;border-radius:10px;padding:5px 8px;font-size:13px;font-weight:700;}
  main{flex:1;padding:14px 14px 90px;overflow-y:auto;}
  .card{background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:16px;padding:14px;margin-bottom:12px;}
  .h{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:800;margin:2px 4px 10px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .stu{display:flex;align-items:center;gap:12px;padding:12px;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;background:#fff;margin-bottom:10px;cursor:pointer;}
  .dot{width:12px;height:12px;border-radius:50%;flex:none;}
  .g{background:var(--green);}.y{background:var(--amber);}.r{background:var(--red);}
  .stu .name{font-weight:800;font-size:15px;}
  .stu .sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600;}
  .pill{font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;}
  .pill.g{background:#e8f8d8;color:#4aa002;}.pill.y{background:#fff3d6;color:#b07000;}.pill.r{background:#ffe3e3;color:#d33131;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .chip{font-size:11px;font-weight:800;background:#ecf8df;color:var(--blue2);padding:4px 9px;border-radius:20px;}
  .catchip{font-size:10px;font-weight:900;background:#ecf8df;color:var(--blue2);padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
  .btn{display:block;width:100%;background:var(--blue);color:#fff;border:none;border-radius:16px;padding:13px;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;cursor:pointer;margin-top:6px;box-shadow:0 4px 0 rgba(0,0,0,.22);transition:transform .06s,box-shadow .06s;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.22);}
  .btn.sec{background:#fff;color:var(--blue);border:2px solid var(--line);box-shadow:0 4px 0 rgba(0,0,0,.10);}
  .btn.g{background:var(--green);}
  .btn.gg{background:#fff;color:#3c4043;border:2px solid var(--line);box-shadow:0 4px 0 rgba(0,0,0,.10);font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;text-transform:none;letter-spacing:0;font-size:15px;}
  .btn.sm{padding:9px 12px;font-size:12px;}
  .ex{border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:12px;margin-bottom:10px;background:#fff;}
  .ex .t{font-weight:800;font-size:15px;}
  .ex .m{font-size:13px;color:var(--muted);margin-top:3px;font-weight:600;}
  .exrow{display:flex;align-items:center;gap:12px;padding:12px;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;margin-bottom:9px;background:#fff;cursor:pointer;}
  .exrow .ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#f3f7ee;flex:none;}
  .chk{width:26px;height:26px;border-radius:10px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex:none;}
  .chk.done{background:var(--green);border-color:var(--green);}
  input,select,textarea{font-family:inherit;}
  .in{width:100%;border:2px solid var(--line);border-radius:12px;padding:11px;font-size:15px;margin-top:6px;background:#fff;font-weight:600;}
  .in:focus{outline:none;border-color:#84d8ff;}
  .setrow{display:flex;align-items:center;gap:8px;margin:8px 0;}
  .setrow .lbl{font-size:13px;color:var(--muted);width:54px;font-weight:700;}
  .setrow input{width:100%;border:2px solid var(--line);border-radius:12px;padding:10px;font-size:16px;text-align:center;font-weight:700;}
  .setrow .u{font-size:12px;color:var(--muted);}
  .daycard{border:2px solid var(--line);border-bottom-width:4px;border-radius:16px;padding:14px;margin-bottom:11px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:12px;}
  .daynum{width:44px;height:44px;border-radius:14px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex:none;box-shadow:0 3px 0 rgba(0,0,0,.20);}
  .banner{border-radius:16px;padding:22px 16px;color:#fff;background:var(--blue);text-align:center;margin-bottom:12px;}
  .banner .em{font-size:56px;line-height:1;}
  .banner .nm{font-size:20px;font-weight:900;margin-top:6px;}
  .vph{position:relative;padding-top:56.25%;border-radius:14px;background:#37464f;overflow:hidden;}
  .vph .in2{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#b8c6cf;gap:6px;}
  .vph iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .play{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;}
  nav{position:fixed;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;background:#fff;border-top:2px solid var(--line);display:flex;}
  nav button{flex:1;background:none;border:none;padding:11px 0 14px;font-size:11px;font-weight:800;color:#afafaf;cursor:pointer;}
  nav button.on{color:var(--blue);}
  nav .ic{display:block;font-size:20px;margin-bottom:2px;}
  .big{font-size:34px;font-weight:900;}.cap{font-size:12px;color:var(--muted);font-weight:600;}
  .back{background:none;border:none;color:var(--blue);font-weight:800;font-size:14px;padding:0;margin-bottom:10px;cursor:pointer;}
  .tag{font-size:11px;color:var(--muted);font-weight:600;}
  .empty{text-align:center;color:var(--muted);padding:34px 16px;}
  .empty .em{font-size:40px;}
  .flex{display:flex;gap:10px;}.flex>*{flex:1;}
  .steps{display:flex;gap:6px;margin:0 4px 12px;}
  .steps span{flex:1;height:6px;border-radius:4px;background:var(--line);}
  .steps span.on{background:var(--blue);}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);pointer-events:none;background:#3c3c3c;color:#fff;padding:10px 16px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:opacity .25s;z-index:50;max-width:90%;text-align:center;}
  .toast.show{opacity:.97;}
  svg{display:block;width:100%;}
  .login-wrap{padding:20px 4px;}
  #gate{position:fixed;inset:0;background:var(--blue);z-index:100;display:flex;align-items:center;justify-content:center;text-align:center;transition:opacity .5s;padding:24px;}
  #gate.bye{opacity:0;pointer-events:none;}
  .gName{font-size:40px;font-weight:900;color:#fff;letter-spacing:1px;animation:gPop .9s ease-out both,gFloat 2.4s ease-in-out 1s infinite;}
  .gIco{font-size:54px;animation:gPop .7s ease-out both,gFloat 2.4s ease-in-out 1s infinite;}
  .gSub{color:rgba(255,255,255,.92);font-size:13px;font-weight:800;margin-top:12px;letter-spacing:.6px;text-transform:uppercase;animation:gPop 1.6s ease-out both;}
  .gCard{max-width:340px;margin:0 auto;color:#fff;animation:gPop .6s ease-out both;}
  .gCard p{font-size:14px;line-height:1.5;color:rgba(255,255,255,.95);font-weight:600;}
  .gIn{width:100%;border:none;border-radius:14px;padding:14px;font-size:26px;font-weight:900;text-align:center;letter-spacing:10px;margin-top:12px;font-family:inherit;}
  .gBtn{display:block;width:100%;background:#fff;color:var(--blue2);border:none;border-radius:16px;padding:14px;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;cursor:pointer;margin-top:12px;box-shadow:0 4px 0 rgba(0,0,0,.22);}
  .gBtn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.22);}
  .gErr{color:#fff;background:rgba(0,0,0,.25);border-radius:10px;padding:6px 10px;font-size:13px;font-weight:800;margin-top:10px;min-height:18px;}
  @keyframes gPop{0%{opacity:0;transform:scale(.7) translateY(24px)}60%{opacity:1;transform:scale(1.06)}100%{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes gFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  /* ---- Instalar como app (A2HS) ---- */
  #a2hs{position:fixed;inset:0;z-index:120;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.45);opacity:0;transition:opacity .3s;}
  #a2hs.show{display:flex;opacity:1;}
  .a2card{background:#fff;width:100%;max-width:460px;border-radius:22px 22px 0 0;padding:22px 20px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.8,.2,1);}
  #a2hs.show .a2card{transform:translateY(0);}
  .a2ico{width:66px;height:66px;border-radius:20px;margin:0 auto 10px;display:block;box-shadow:0 4px 0 rgba(0,0,0,.12);}
  .a2t{font-size:20px;font-weight:900;text-align:center;color:var(--ink);}
  .a2s{font-size:14px;font-weight:600;color:var(--muted);text-align:center;margin-top:6px;line-height:1.5;}
  .a2steps{margin:16px 0 4px;padding:0;list-style:none;}
  .a2steps li{display:flex;align-items:center;gap:12px;padding:10px 12px;border:2px solid var(--line);border-bottom-width:3px;border-radius:14px;margin-bottom:8px;font-size:14px;font-weight:700;color:var(--ink);}
  .a2steps li .n{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex:none;}
  .a2steps li .bi{font-size:22px;flex:none;}
  .a2dismiss{display:block;width:100%;background:none;border:none;color:var(--muted);font-weight:800;font-size:13px;padding:12px 0 2px;cursor:pointer;text-align:center;}
</style>
<style id="dk">

nav{background:var(--headerbg);border-top:1px solid var(--line);}

.btn.sec{background:var(--card);color:var(--blue);border:2px solid var(--line);}

<div id="gate"><div style="position:absolute;bottom:18px;left:0;right:0;text-align:center;color:rgba(255,255,255,.75);font-size:12px;font-weight:700">v2.8.4</div><div id="gateInner"><div class="gIco">🏋️</div><div class="gName">Universal Fit</div><div class="gSub">Entrená mejor. Progresá siempre.</div></div></div>

<script>
const KEY='uf_mvp_v4';
let S;
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return seed();}
function save(){try{localStorage.setItem((typeof CLOUD!=='undefined'&&CLOUD.on)?('uf_cloud_'+CLOUD.uid):KEY,JSON.stringify(S));}catch(e){} if(typeof cloudOn==='function'&&cloudOn())cloudQueue();}
function uid(){return Math.random().toString(36).slice(2,9);}
function today(){return new Date().toISOString().slice(0,10);}
function dOffset(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function daysSince(ds){if(!ds)return 999;return Math.round((new Date(today())-new Date(ds))/86400000);}
function val(id){const el=document.getElementById(id);return el?el.value:'';}
function esc(s){return(s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fn(name){return (name||'').split(' ')[0];}
function fmt(ds){const p=ds.split('-');return p[2]+'/'+p[1];}
function optList(arr,sel){return arr.map(v=>`<option ${String(v)===String(sel)?'selected':''}>${v}</option>`).join('');}

const CATS=['Piernas','Pecho','Espalda','Hombros','Brazos','Core','Cardio'];
const CAT_EMOJI={Piernas:'🦵',Pecho:'🎽',Espalda:'🔻',Hombros:'🏋️',Brazos:'💪',Core:'🧱',Cardio:'🏃'};
function catEmoji(c){return CAT_EMOJI[c]||'🏋️';}
const EX_CATALOG={
 Piernas:['Sentadilla','Prensa de piernas','Peso muerto','Peso muerto rumano','Zancadas','Hip thrust','Extensión de cuádriceps','Curl femoral','Elevación de gemelos'],
 Pecho:['Press banca','Press inclinado con mancuernas','Aperturas','Máquina de pecho','Flexiones','Fondos en paralelas'],
 Espalda:['Dominadas','Jalón al pecho','Remo con barra','Remo con mancuerna','Remo en polea baja'],
 Hombros:['Press militar','Elevaciones laterales','Elevaciones frontales','Pájaros (deltoide posterior)','Face pull'],
 Brazos:['Curl con barra','Curl con mancuernas','Curl martillo','Extensión de tríceps en polea','Press francés','Fondos de tríceps'],
 Core:['Plancha','Abdominales crunch','Elevación de piernas colgado','Russian twist','Rueda abdominal'],
 Cardio:['Cinta (caminata inclinada)','Bicicleta','Elíptico','Remo (máquina)','Salto a la soga']
};
const POOLS={
 Novato:{Piernas:['Prensa de piernas','Extensión de cuádriceps','Curl femoral'],Pecho:['Máquina de pecho','Flexiones'],Espalda:['Jalón al pecho','Remo en polea baja'],Hombros:['Elevaciones laterales'],Brazos:['Curl con mancuernas','Extensión de tríceps en polea'],Core:['Plancha','Abdominales crunch'],Cardio:['Cinta (caminata inclinada)']},
 Intermedio:{Piernas:['Sentadilla','Peso muerto rumano','Zancadas'],Pecho:['Press banca','Press inclinado con mancuernas'],Espalda:['Remo con barra','Dominadas'],Hombros:['Press militar','Elevaciones laterales'],Brazos:['Curl con barra','Press francés'],Core:['Plancha','Elevación de piernas colgado'],Cardio:['Bicicleta']},
 Avanzado:{Piernas:['Sentadilla','Peso muerto','Hip thrust'],Pecho:['Press banca','Press inclinado con mancuernas','Fondos en paralelas'],Espalda:['Dominadas','Remo con barra'],Hombros:['Press militar','Face pull'],Brazos:['Curl con barra','Press francés'],Core:['Rueda abdominal','Elevación de piernas colgado'],Cardio:['Remo (máquina)']}
};
const SPLITS={
 2:[['Full body A',['Piernas','Pecho','Espalda']],['Full body B',['Piernas','Hombros','Brazos','Core']]],
 3:[['Empuje · pecho y hombro',['Pecho','Hombros','Brazos']],['Tirón · espalda y bíceps',['Espalda','Brazos']],['Piernas',['Piernas','Core']]],
 4:[['Tren superior A',['Pecho','Espalda']],['Tren inferior A',['Piernas','Core']],['Tren superior B',['Hombros','Brazos']],['Tren inferior B',['Piernas','Core']]],
 5:[['Pecho y tríceps',['Pecho','Brazos']],['Espalda y bíceps',['Espalda','Brazos']],['Piernas',['Piernas','Core']],['Hombros y core',['Hombros','Core']],['Full body',['Pecho','Espalda','Piernas']]],
 6:[['Empuje A',['Pecho','Hombros']],['Tirón A',['Espalda','Brazos']],['Piernas A',['Piernas','Core']],['Empuje B',['Pecho','Brazos']],['Tirón B',['Espalda','Core']],['Piernas B',['Piernas','Hombros']]],
 7:[['Empuje A',['Pecho','Hombros']],['Tirón A',['Espalda','Brazos']],['Piernas A',['Piernas','Core']],['Empuje B',['Pecho','Brazos']],['Tirón B',['Espalda','Core']],['Piernas B',['Piernas','Hombros']],['Cardio y movilidad',['Cardio','Core']]]
};
function scheme(obj){return {Volumen:{s:4,r:10,n:'',rest:90},Adelgazar:{s:3,r:15,n:'Descansos cortos (30-45s)',rest:40},Fuerza:{s:5,r:5,n:'Descanso largo (2-3 min)',rest:150},'Salud general':{s:2,r:12,n:'',rest:75},Rendimiento:{s:4,r:8,n:'',rest:90}}[obj]||{s:3,r:10,n:'',rest:90};}
function mkEx(name,cat,sc,w){const bw=/Plancha|Dominadas|Flexiones|Fondos|Face pull|soga|Cinta|Bicicleta|Elíptico/.test(name);return {id:uid(),name,category:cat,sets:sc.s,reps:sc.r,weight:bw?0:w,rest:sc.rest,note:sc.n,video:''};}
function genRoutine(obj,niv,dias){
  const sc=scheme(obj),w={Novato:20,Intermedio:40,Avanzado:60}[niv]||20;
  const split=SPLITS[dias]||SPLITS[3];const pool=POOLS[niv]||POOLS.Novato;
  const days=split.map(([dname,cats])=>{
    let exs=[];cats.forEach(c=>{(pool[c]||[]).slice(0,2).forEach(nm=>exs.push(mkEx(nm,c,sc,w)));});
    if(exs.length>6)exs=exs.slice(0,6);
    return {id:uid(),name:dname,exercises:exs};
  });
  return {id:uid(),owner:null,name:'Plan '+obj+' · '+niv,days};
}
function seed(){
  const tpl={id:uid(),name:'Full body (plantilla)',owner:null,days:genRoutine('Volumen','Intermedio',3).days};
  const routines=[tpl];

/* helpers */
function routineOf(st){return S.routines.find(r=>r.id===st.routineId)||null;}
function allEx(rt){return rt?rt.days.reduce((a,d)=>a.concat(d.exercises),[]):[];}
function findEx(rt,id){return allEx(rt).find(e=>e.id===id);}
function lastLog(st){if(!st.logs.length)return null;return st.logs.map(l=>l.date).sort().slice(-1)[0];}
function statusOf(st){const d=daysSince(lastLog(st));if(d<=3)return{c:'g',t:'al día'};if(d<=7)return{c:'y',t:'aflojando'};return{c:'r',t:'sin registrar'};}
function lastText(st){const d=lastLog(st);if(!d)return'nunca registró';const n=daysSince(d);if(n===0)return'entrenó hoy';if(n===1)return'ayer';return'hace '+n+' días';}
function weekKey(ds){const d=new Date(ds);const on=new Date(d);on.setDate(d.getDate()-((d.getDay()+6)%7));return on.toISOString().slice(0,10);}
function streak(st){const wk=new Set(st.logs.map(l=>weekKey(l.date)));let n=0,d=new Date();for(;;){if(wk.has(weekKey(d.toISOString().slice(0,10)))){n++;d.setDate(d.getDate()-7);}else break;}return n;}
function progress(st,exId){return st.logs.filter(l=>l.entries.some(e=>e.exerciseId===exId)).map(l=>{const e=l.entries.find(x=>x.exerciseId===exId);return{date:l.date,kg:Math.max(...e.sets.map(s=>+s.kg||0))};}).sort((a,b)=>a.date<b.date?-1:1);}
function weekly(st){const out=[];for(let i=3;i>=0;i--){const s=new Date();s.setDate(s.getDate()-i*7);const k=weekKey(s.toISOString().slice(0,10));out.push({k:'S'+(4-i),c:st.logs.filter(l=>weekKey(l.date)===k).length});}return out;}
function loggedToday(st,exId){const l=st.logs.find(x=>x.date===today());return l&&l.entries.some(e=>e.exerciseId===exId);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}
function lineChart(pts){
  if(pts.length<2)return '<div class="cap" style="padding:12px 4px">Registrá al menos 2 entrenos para ver la evolución.</div>';
  const W=380,H=130,p=26,xs=pts.map((_,i)=>p+i*(W-2*p)/(pts.length-1));
  const ys=pts.map(d=>d.kg),mn=Math.min(...ys),mx=Math.max(...ys),rg=(mx-mn)||1,Y=v=>H-p-(v-mn)/rg*(H-2*p);
  const d=pts.map((pt,i)=>(i?'L':'M')+xs[i].toFixed(0)+' '+Y(pt.kg).toFixed(0)).join(' ');
  const dots=pts.map((pt,i)=>`<circle cx="${xs[i].toFixed(0)}" cy="${Y(pt.kg).toFixed(0)}" r="3.5" style="fill:var(--blue)"/><text x="${xs[i].toFixed(0)}" y="${(Y(pt.kg)-8).toFixed(0)}" font-size="10" fill="#737373" text-anchor="middle">${pt.kg}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}"><path d="${d}" fill="none" style="stroke:var(--blue)" stroke-width="2.5"/>${dots}</svg>`;
}
function barChart(data){
  const W=380,H=120,p=22,bw=54,mx=Math.max(1,...data.map(d=>d.c));
  const bars=data.map((d,i)=>{const x=p+i*((W-2*p)/data.length)+8,h=(d.c/mx)*(H-2*p),y=H-p-h;
    return `<rect x="${x}" y="${y.toFixed(0)}" width="${bw}" height="${h.toFixed(0)}" rx="6" style="fill:var(--green)"/><text x="${x+bw/2}" y="${H-6}" font-size="11" fill="#737373" text-anchor="middle">${d.k}</text><text x="${x+bw/2}" y="${(y-5).toFixed(0)}" font-size="11" fill="#3c3c3c" text-anchor="middle" font-weight="700">${d.c}</text>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}">${bars}</svg>`;
}
function videoBox(url,name){
  if(url&&(url.indexOf('blob:')===0||url.indexOf('/storage/v1/object/public/')>=0||/\.(mp4|webm|mov|m4v)(\?|$)/i.test(url)))return `<div class="vph"><video src="${esc(url)}" controls playsinline preload="metadata" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000"></video></div>`;
  if(url){const m=url.match(/(?:youtu\.be\/|v=|shorts\/)([\w-]{11})/);if(m)return `<div class="vph"><iframe src="https://www.youtube.com/embed/${m[1]}" allowfullscreen></iframe></div>`;return `<div class="vph"><div class="in2"><div class="play">▶</div><a class="link" style="color:rgba(255,255,255,.88)" href="${esc(url)}" target="_blank">Ver video de técnica</a></div></div>`;}
  if(typeof exerciseAnim==='function')return exerciseAnim(name,(typeof exerciseVideoUrl==='function'?exerciseVideoUrl(name):''));
  return `<div class="vph"><div class="in2"><div class="play">▶</div><a style="color:rgba(255,255,255,.88);font-weight:700;text-decoration:underline" href="https://www.youtube.com/results?search_query=${encodeURIComponent((name||'ejercicio')+' técnica como hacer')}" target="_blank">🔎 Ver técnica en YouTube</a><div class="cap" style="color:#b8c6cf">Tu profe todavía no cargó su propio video</div></div></div>`;
}

 });}

function wins(s){
  const out=[];const sk=streak(s);
  const best={};let lastPr=null;s.logs.slice().sort((a,b)=>a.date<b.date?-1:1).forEach(l=>l.entries.forEach(en=>{const mx=Math.max(0,...en.sets.map(x=>+x.kg||0));if(mx>(best[en.exerciseId]||0)){if(best[en.exerciseId])lastPr={date:l.date,kg:mx,exId:en.exerciseId};best[en.exerciseId]=mx;}}));
  if(lastPr&&daysSince(lastPr.date)<=7){const e=findEx(routineOf(s),lastPr.exId);out.push('🏆 ¡Récord personal'+(e?' en '+esc(e.name):'')+': '+lastPr.kg+' kg! Impresionante.');}
  if(sk>=2)out.push('🔥 ¡Llevás '+sk+' semanas seguidas entrenando — no cortes la racha!');
  const wk=weekly(s),tw=wk[wk.length-1].c;
  if(s.dias&&tw>=s.dias)out.push('✅ ¡Semana completa: '+tw+' de '+s.dias+' entrenos! Objetivo cumplido.');
  const ms=s.measures||[];
  if(ms.length>=2){const f=ms[0],l=ms[ms.length-1],dp=(l.peso||0)-(f.peso||0);
    if(s.objetivo==='Adelgazar'&&dp<0)out.push('🎉 ¡Bajaste '+Math.abs(dp).toFixed(1)+' kg desde que arrancaste! Tu esfuerzo se nota.');
    if((s.objetivo==='Volumen'||s.objetivo==='Fuerza')&&dp>0)out.push('💪 ¡Sumaste '+dp.toFixed(1)+' kg de masa desde que arrancaste!');
    const db=(l.brazos||0)-(f.brazos||0);if(db>0)out.push('💪 Tus brazos crecieron '+db.toFixed(1)+' cm. Se está notando.');
    const dc=(l.cintura||0)-(f.cintura||0);if(dc<0)out.push('📏 Bajaste '+Math.abs(dc).toFixed(1)+' cm de cintura. ¡Enorme!');
  }
  if(!out.length)out.push(s.logs.length?'🌱 Cada entreno suma. ¡Hoy puede ser tu día de récord!':'🚀 Todo listo para tu primer entreno. ¡Arrancá hoy!');
  return out;
}

function progSuggestions(s){const rt=routineOf(s);if(!rt)return [];const out=[];allEx(rt).forEach(e=>{if(!e.weight)return;const sess=s.logs.filter(l=>l.entries.some(en=>en.exerciseId===e.id)).sort((a,b)=>a.date<b.date?-1:1).slice(-2);if(sess.length<2)return;const ok=sess.every(l=>{const en=l.entries.find(x=>x.exerciseId===e.id);return en.sets.length&&en.sets.every(x=>(+x.reps||0)>=e.reps&&(+x.kg||0)>=e.weight);});if(ok)out.push({ex:e,next:Math.round((e.weight+Math.max(2.5,e.weight*0.05))*2)/2});});return out;}
function progCard(s){const ps=progSuggestions(s);if(!ps.length)return '';return `<div class="card" style="border-color:#2C5F2D;background:#0F1F12"><div class="h" style="margin:0 0 6px">📈 Sugerencias de progresión</div><div class="cap" style="margin:0 0 4px">Cumplió el objetivo completo las últimas 2 sesiones:</div>${ps.map(p=>`<div class="row" style="padding:6px 0;border-bottom:1px solid #dcefdf"><div><b>${esc(p.ex.name)}</b><div class="cap">${p.ex.sets}×${p.ex.reps} con ${p.ex.weight} kg ✓✓</div></div><button class="btn g sm" style="width:auto;margin:0" onclick="applyProg('${s.id}','${p.ex.id}',${p.next})">↑ ${p.next} kg</button></div>`).join('')}</div>`;}
function applyProg(sid,exId,kg){const s=S.students.find(x=>x.id===sid);const e=findEx(routineOf(s),exId);if(!e)return;const old=e.weight;e.weight=kg;s.msgs=s.msgs||[];s.msgs.unshift({id:uid(),date:today(),text:'📈 ¡Subiste de nivel! Te ajusté '+e.name+' de '+old+' a '+kg+' kg. ¡A romperla!',read:false});save();toast('Peso actualizado y alumno avisado 📈');render();}
function monthKey(ds){return ds.slice(0,7);}
function groupCard(s){const others=S.students.filter(x=>x.id!==s.id&&x.logs.length);if(!others.length)return '';
 const mk=monthKey(today());const rank=S.students.map(x=>({n:fn(x.name),me:x.id===s.id,c:x.logs.filter(l=>monthKey(l.date)===mk).length})).sort((a,b)=>b.c-a.c).slice(0,3);const medals=['🥇','🥈','🥉'];
 const feed=others.map(x=>({x,l:[...x.logs].sort((a,b)=>a.date<b.date?1:-1)[0]})).sort((a,b)=>a.l.date<b.l.date?1:-1).slice(0,4);
 return `<div class="card"><div class="h" style="margin:0 0 8px">👥 Tu grupo</div><div class="cap" style="margin:0 0 6px">Ranking del mes</div>${rank.map((r,i)=>`<div class="row" style="padding:4px 0"><span>${medals[i]||'·'} ${esc(r.n)}${r.me?' <b>(vos)</b>':''}</span><span class="cap">${r.c} entrenos</span></div>`).join('')}<div class="cap" style="margin:10px 0 6px">Actividad de tus compañeros</div>${feed.map(f=>`<div class="row" style="padding:6px 0;border-top:1px solid var(--line)"><div><b>${esc(fn(f.x.name))}</b> entrenó ${fmt(f.l.date)} ${f.l.feel||''}<div class="cap">${f.l.entries.length} ejercicio(s)${f.l.claps?' · 👏 '+f.l.claps:''}</div></div><button class="btn sec sm" style="width:auto;margin:0" onclick="clap('${f.x.id}','${f.l.date}')">👏</button></div>`).join('')}</div>`;}
function clap(sid,date){const t=S.students.find(x=>x.id===sid);const l=t.logs.find(x=>x.date===date);if(!l)return;l.claps=(l.claps||0)+1;t.msgs=t.msgs||[];t.msgs.unshift({id:uid(),date:today(),text:'👏 '+fn(me().name)+' te aplaudió por tu entreno del '+fmt(date)+'. ¡Seguí así!',read:false});save();toast('👏 enviado');render();}

function toggleBrand(){S.ui.brandEdit=!S.ui.brandEdit;save();render();}
function brandCard(){if(!S.ui.brandEdit)return '';const b=S.brand||{};const colors=['#58cc02','#1cb0f6','#ce82ff','#ff4b4b','#ff9600','#00cd9c'];return `<div class="card"><div class="h" style="margin:0 0 6px">🎨 Tu marca en la app</div><div class="cap">Tus alumnos ven tu nombre y tu color al entrar.</div><input class="in" id="brName" placeholder="Nombre de tu negocio (ej: RG Training)" value="${esc(b.name||'')}"/><div class="flex" style="margin-top:10px">${colors.map(c=>`<button style="height:36px;border-radius:8px;border:${(b.color||'#58cc02')===c?'3px solid #1A2230':'1px solid #ccc'};background:${c};cursor:pointer" onclick="setBrand(val('brName')||'${esc(b.name||'')}','${c}')"></button>`).join('')}</div><button class="btn sm" style="margin-top:10px" onclick="setBrand(val('brName'),(S.brand||{}).color)">Guardar</button></div>`;}

/* Ajustes 02-jul: gestión de alumnos, inicio bloqueado, onboarding PT/alumno */
function activeStudents(){return S.students.filter(x=>x.active!==false&&!x.pending&&!x.ext);}
function codeOf(st){return st.id.slice(0,6);}
function deactivateStudent(id){const st=S.students.find(x=>x.id===id);if(!confirm('¿Desactivar a '+fn(st.name)+'? No aparece más entre los activos, pero TODA su historia se guarda para cuando vuelva.'))return;st.active=false;save();toast(fn(st.name)+' desactivado ⏸ (historia guardada)');go('pt_home');}
function reactivateStudent(id){const st=S.students.find(x=>x.id===id);st.active=true;save();toast(fn(st.name)+' reactivado ▶ ¡Bienvenido de vuelta!');render();}
function deleteStudent(id){const st=S.students.find(x=>x.id===id);if(!confirm('¿BORRAR a '+fn(st.name)+' DEFINITIVAMENTE?\n\nSe pierde TODA su historia: rutinas, entrenos, medidas, fotos y mensajes. Esta acción no se puede deshacer.\n\nSi solo se va por un tiempo, usá "Desactivar".'))return;S.routines=S.routines.filter(r=>r.owner!==id);S.students=S.students.filter(x=>x.id!==id);S.notifs=(S.notifs||[]).filter(n=>n.studentId!==id);if(S.ui.studentId===id)S.ui.studentId=S.students[0]&&S.students[0].id;save();toast('Alumno borrado 🗑');go('pt_home');}
function dayStarted(s,day){if(!day)return false;if(day.exercises.some(e=>loggedToday(s,e.id)))return true;const w=S.ui.workout;return !!(w&&w.sid===s.id&&w.dayId===day.id&&w.date===today());}
function startWorkout(dayId){const s=me();S.ui.workout={sid:s.id,dayId,date:today()};save();toast('¡A entrenar! 💪');const rt=routineOf(s);const day=rt&&rt.days.find(d=>d.id===dayId);if(day&&day.exercises[0]){S.ui.logExerciseId=day.exercises[0].id;go('al_log');}else render();}
function pendingCard(){const ps=S.students.filter(x=>x.pending&&!x.ext);if(!ps.length)return '';return `<div class="card" style="border-color:#6B5A1E;background:#211C10"><div class="h" style="margin:0 0 8px">📥 Solicitudes de alumnos nuevos (${ps.length})</div>${ps.map(p=>`<div style="padding:8px 0;border-bottom:1px solid #eadfc8"><b>${esc(p.name)}</b> <span class="cap">· ${esc(p.objetivo||'—')} · ${esc(p.nivel||'—')} · ${p.dias||'?'} días/sem${p.edad?' · '+p.edad+' años':''}</span><div class="flex" style="margin-top:6px"><button class="btn g sm" onclick="acceptStudent('${p.id}')">✓ Aceptar</button><button class="btn sec sm" onclick="rejectStudent('${p.id}')">Rechazar</button></div></div>`).join('')}</div>`;}
function acceptStudent(id){const st=S.students.find(x=>x.id===id);st.pending=false;const rt=genRoutine(st.objetivo||'Salud general',st.nivel||'Novato',st.dias||3);rt.owner=st.id;S.routines.push(rt);st.routineId=rt.id;st.msgs=st.msgs||[];st.msgs.unshift({id:uid(),date:today(),text:'🎉 ¡Bienvenido! Tu entrenador aceptó tu solicitud y ya te armó tu primera rutina.',read:false});save();toast(fn(st.name)+' aceptado ✓ Rutina inicial generada');render();}
function rejectStudent(id){if(!confirm('¿Rechazar esta solicitud? Se elimina.'))return;S.students=S.students.filter(x=>x.id!==id);save();toast('Solicitud rechazada');render();}
function shareLink(id){const st=S.students.find(x=>x.id===id);const url=inviteUrl(codeOf(st).toUpperCase());try{navigator.clipboard.writeText(url);}catch(e){}toast('🔗 Link de invitación de '+fn(st.name)+' copiado — al abrirlo entra directo con su código');}
function vPtHome(){
  const foot=`${brandCard()}${ptProfileCard()}<div class="cap" style="text-align:center;margin-top:16px">Sesión: ${esc(S.user.email||S.user.name)} · ${UF_VERSION} · <a onclick="toggleBrand()" style="color:var(--blue);cursor:pointer;font-weight:700">🎨 Mi marca</a> · <a onclick="togglePtProfile()" style="color:var(--blue);cursor:pointer;font-weight:700">👤 Mi perfil</a> · <a onclick="logout()" style="color:var(--blue);cursor:pointer;font-weight:700">⏻ Cerrar sesión</a></div>`;
  const act=activeStudents(),inact=S.students.filter(x=>x.active===false);
  const inactSec=inact.length?`<div class="h" style="margin-top:16px">⏸ Inactivos (${inact.length})</div>`+inact.map(s=>`<div class="stu" style="opacity:.7" onclick="openStudent('${s.id}')"><span class="dot" style="background:#9aa4b2"></span><div style="flex:1"><div class="name">${esc(s.name)}</div><div class="sub">historia guardada · ${s.logs.length} entrenos</div></div><button class="btn sec sm" style="width:auto;margin:0" onclick="event.stopPropagation();reactivateStudent('${s.id}')">▶</button></div>`).join(''):'';
  if(!act.length)return `<div class="h">Mis alumnos</div>${teamCodeCard()}${pendingCard()}<div class="empty"><div class="em">👥</div><p>Todavía no tenés alumnos.<br>Compartí tu <b>link de invitación</b> 👆 — tus alumnos entran solos con tu código.</p></div>${inactSec}${foot}`;
  const list=act.map(s=>{const st=statusOf(s),rt=routineOf(s);return `<div class="stu" onclick="openStudent('${s.id}')"><span class="dot ${st.c}"></span><div style="flex:1"><div class="name">${esc(s.name)}</div><div class="sub">${rt?rt.days.length+' días':'sin rutina'} · ${lastText(s)}</div></div><span class="pill ${st.c}">${st.t}</span></div>`;}).join('');
  const alert=act.filter(s=>statusOf(s).c==='r').length;
  return `<div class="h">Mis alumnos (${act.length})</div>${teamCodeCard()}${novedCard()}${pendingCard()}${alert?`<div class="card" style="border-color:#5A2A2E;background:#241416"><b style="color:#FF8A95">⚠ ${alert} sin registrar</b><div class="cap">Escribiles para que no abandonen.</div></div>`:''}${list}${inactSec}${foot}`;
}
function vAlDay(){
  const s=me(),rt=routineOf(s);if(!rt)return vAlHome();const day=rt.days.find(d=>d.id===S.ui.dayId)||rt.days[0];
  const started=dayStarted(s,day);
  const done=day.exercises.filter(e=>loggedToday(s,e.id)).length;
  let groups='';
  CATS.concat(['Otros']).forEach(cat=>{
    const list=day.exercises.filter(e=>(e.category||'Otros')===cat);if(!list.length)return;
    groups+=`<div class="h" style="margin:14px 4px 8px">${catEmoji(cat)} ${cat}</div>`+list.map(e=>`<div class="exrow" ${started?`onclick="openLog('${e.id}')"`:'style="opacity:.45;pointer-events:none"'}><div class="ico">${catEmoji(e.category)}</div><div style="flex:1"><div class="t">${esc(e.name)}</div><div class="m">${e.sets} x ${e.reps}${e.weight?' · '+e.weight+'kg':''}</div></div><div class="chk ${loggedToday(s,e.id)?'done':''}">${loggedToday(s,e.id)?'✓':(started?'':'🔒')}</div></div>`).join('');
  });
  return `<button class="back" onclick="go('al_days')">← Mis días</button>
  <div class="card" style="background:var(--hero);color:#fff;border:none"><div style="font-size:20px;font-weight:800">${esc(day.name)}</div><div class="cap" style="color:rgba(255,255,255,.88);margin-top:2px">${day.exercises.length} ejercicios · ${done}/${day.exercises.length} hechos hoy</div></div>
  ${day.exercises.length?(started?`<div class="cap" style="text-align:center;margin:2px 0 4px">🏁 Entrenamiento en curso — tocá un ejercicio para registrarlo</div>`:`<button class="btn g" onclick="startWorkout('${day.id}')">▶ Iniciar rutina</button><div class="cap" style="text-align:center;margin-top:6px">🔒 Los ejercicios se habilitan cuando inicias el entrenamiento.</div>`):'<div class="cap" style="text-align:center">Este día no tiene ejercicios.</div>'}
  ${feelCard(s)}
  ${groups}`;
}

/* ---- Onboarding Alumno ----
   Camino CÓDIGO:  1 elegir → 2 código → 3 nombre → 4 género → 5 edad → [equipo: 6 objetivo → 7 nivel → 8 días] → 9 datos físicos
   Camino BUSCAR:  1 elegir → 21 nombre → 22 zona → (dir → perfil) → 26 objetivo → 27 nivel → 28 días */
function alFlow(){const d=S.ui.ob.d;if(d.path==='code')return d.mode==='claim'?[1,2,3,4,5,9]:[1,2,3,4,5,6,7,8,9];if(d.path==='new')return [1,21,22,25,26,27,28];return [1];}
function obAlBack(){const o=S.ui.ob,d=o.d;
 if(o.view==='prof'){o.view='dir';save();render();return;}
 if(o.view==='dir'){o.view=null;o.step=22;save();render();return;}
 if(o.step===26){o.view='prof';save();render();return;}
 if(o.step===10){o.step=9;save();render();return;}
 if(o.step===29){o.step=28;save();render();return;}
 if(o.step===9){o.step=(d.mode==='claim')?5:8;save();render();return;}
 if(o.step===21){o.step=1;d.path=null;save();render();return;}
 if(o.step===2){o.step=1;d.path=null;save();render();return;}
 if(o.step<=1){S.ui.ob=null;save();render();return;}
 o.step--;save();render();}

 const el=document.getElementById('a2hs'),card=document.getElementById('a2card');if(!el||!card)return;
 const ios=isIOS(), canNative=!!A2HS_DEFERRED;
 let body='';
 if(canNative){
  body=`<button class="btn g" onclick="doNativeInstall()">📲 Instalar Universal Fit</button>
   <p class="a2s" style="margin-top:10px">Se agrega a tu pantalla de inicio y se abre como una app, a pantalla completa.</p>`;
 }else if(ios){
  body=`<ul class="a2steps">
    <li><span class="n">1</span><span class="bi">⬆️</span><span>Tocá el botón <b>Compartir</b> abajo en Safari</span></li>
    <li><span class="n">2</span><span class="bi">➕</span><span>Elegí <b>"Agregar a inicio"</b></span></li>
    <li><span class="n">3</span><span class="bi">✅</span><span>Tocá <b>Agregar</b> — ¡listo!</span></li>
   </ul>
   <p class="a2s">Va a quedar como una app más, con su ícono, y se abre a pantalla completa.</p>`;
 }else if(isAndroid()){
  body=`<ul class="a2steps">
    <li><span class="n">1</span><span class="bi">⋮</span><span>Tocá el <b>menú</b> (arriba a la derecha) en Chrome</span></li>
    <li><span class="n">2</span><span class="bi">📲</span><span>Elegí <b>"Instalar app"</b> o "Agregar a inicio"</span></li>
    <li><span class="n">3</span><span class="bi">✅</span><span>Confirmá — ¡listo!</span></li>
   </ul>
   <p class="a2s">Va a quedar como una app más y se abre a pantalla completa.</p>`;
 }else{
  body=`<ul class="a2steps">
    <li><span class="n">1</span><span class="bi">⋮</span><span>Abrí el <b>menú</b> del navegador</span></li>
    <li><span class="n">2</span><span class="bi">📲</span><span>Elegí <b>"Instalar Universal Fit"</b> / "Crear acceso directo"</span></li>
   </ul>
   <p class="a2s">Consejo: en el celular la experiencia es a pantalla completa, como una app.</p>`;
 }
 card.innerHTML=`<img class="a2ico" src="icon-192.png" alt="Universal Fit"/>
  <div class="a2t">Tené Universal Fit a mano 📲</div>
  <div class="a2s">${firstTime?'Sumá un acceso directo en tu teléfono para entrar de una, como si fuera una app.':'Instalá Universal Fit en tu teléfono como una app.'}</div>
  ${body}
  <button class="a2dismiss" onclick="dismissA2hs()">Ahora no</button>`;
 el.classList.add('show');
}
async function doNativeInstall(){
 if(!A2HS_DEFERRED){toast('Usá el menú del navegador para instalar');return;}
 const e=A2HS_DEFERRED;A2HS_DEFERRED=null;
 try{e.prompt();const r=await e.userChoice;
  if(r&&r.outcome==='accepted'){try{localStorage.setItem('uf_a2hs','installed');}catch(_){}}
  else{try{localStorage.setItem('uf_a2hs','dismissed');}catch(_){}}
 }catch(err){}
 closeA2hs();
}
function dismissA2hs(){try{localStorage.setItem('uf_a2hs','dismissed');}catch(e){}closeA2hs();}
function closeA2hs(){const el=document.getElementById('a2hs');if(el)el.classList.remove('show');}
/* Entrada manual: permite reabrir la oferta aunque se haya descartado */
function openInstallManual(){if(isStandalone()){toast('Ya la estás usando como app ✅');return;}openInstall(false);}
/* Registro del service worker (habilita instalación en Android + arranque offline) */
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
function showGateCode(){const i=document.getElementById('gateInner');if(!i)return;
 i.innerHTML=`<div class="gCard"><div class="gIco" style="font-size:44px">🔑</div><div class="gName" style="font-size:26px;animation:none">Acceso anticipado</div><p style="margin-top:12px">Estás entrando a una <b>versión anticipada</b> de Universal Fit. Si tenés este acceso es porque fuiste elegido/a como alguien especial 💚.</p><p>Ingresá el <b>código de apertura</b> para continuar:</p><input class="gIn" id="gateCode" type="tel" inputmode="numeric" maxlength="4" placeholder="····" oninput="if(this.value.length===4)tryGate()" onkeydown="if(event.key==='Enter')tryGate()"/><div class="gErr" id="gateErr"></div><button class="gBtn" onclick="tryGate()">Entrar →</button></div>`;
 const inp=document.getElementById('gateCode');if(inp)setTimeout(function(){inp.focus();},100);}
function tryGate(){const v=(document.getElementById('gateCode')?document.getElementById('gateCode').value:'').trim();
 if(v==='2246'){try{localStorage.setItem('uf_gate','1');}catch(e){}hideGate();}
 else{const e=document.getElementById('gateErr');if(e)e.textContent='Código incorrecto — probá de nuevo';const i=document.getElementById('gateCode');if(i){i.value='';i.focus();}}}
try{if(new URLSearchParams(location.search).get('gate')==='reset'){localStorage.removeItem('uf_gate');history.replaceState(null,'',location.pathname);}}catch(e){}
/* ---- Cuenta desactivada por el administrador ---- */
const ADMIN_UID='ac05eb3e-5679-4ac2-9dae-3c54fac2cdf6';
let BLOCKED={on:false,kind:null,name:'',email:'',sent:false};
function vBlocked(){return `<div class="login-wrap">
 <div class="card" style="text-align:center;border:none;background:#3c3c3c;color:#fff;padding:28px 16px"><div style="font-size:48px">🚫</div><div style="font-size:20px;font-weight:900;margin-top:8px">Cuenta desactivada</div><div class="cap" style="color:rgba(255,255,255,.9);margin-top:8px">Tu cuenta fue desactivada por el administrador de la plataforma. Si creés que es un error, pedí la reactivación.</div></div>
 <div class="card">${BLOCKED.sent?'<div class="empty cap" style="padding:10px">📨 Solicitud enviada — el administrador va a revisarla.</div>':'<button class="btn" onclick="askActivation()">📨 Pedir activación</button>'}<button class="btn sec" style="margin-top:8px" onclick="logout()">⏻ Salir</button></div></div>`;}
async function askActivation(){if(BLOCKED.sent)return;
 try{const {error}=await sb.from('v1_notifs').insert({trainer_uid:ADMIN_UID,student_id:null,text:'📨 SOLICITUD DE ACTIVACIÓN: '+BLOCKED.name+' ('+(BLOCKED.email||'sin email')+', '+(BLOCKED.kind==='pt'?'entrenador':'alumno')+') pide reactivar su cuenta'});
  if(error){toast('No pude enviar la solicitud: '+error.message);return;}
  BLOCKED.sent=true;toast('Solicitud enviada al administrador ✓');render();
 }catch(e){toast('Error de conexión');}}
/* ---- Google post-OAuth: eleccion de rol ---- */
function vGRole(){const g=S.ui.grole||{};return `<div class="login-wrap">
 <div class="card" style="text-align:center;border:none;background:var(--hero);color:#fff;padding:24px 16px"><div style="font-size:44px">✅</div><div style="font-size:20px;font-weight:900;margin-top:6px">¡Hola${g.name?', '+esc(fn(g.name)):''}!</div><div class="cap" style="color:rgba(255,255,255,.9);margin-top:4px">Entraste con Google (${esc(g.email)}). Un paso más: ¿cómo vas a usar Universal Fit?</div></div>
 <div class="card"><button class="btn" onclick="gRole('pt')">🏋️ Soy entrenador</button><button class="btn g" style="margin-top:8px" onclick="gRole('al')">🙋 Soy alumno</button></div>
 <div class="cap" style="text-align:center;margin-top:8px"><a onclick="gCancel()" style="color:var(--blue);cursor:pointer;font-weight:700">Salir</a></div></div>`;}
function gRole(k){const g=S.ui.grole||{};S.ui.grole=null;
 if(k==='pt')S.ui.ob={kind:'pt',step:1,d:{oauth:true,email:g.email||'',name:g.name||''}};
 else S.ui.ob={kind:'al',step:1,d:{oauth:true,email:g.email||'',name:g.name||''},view:null};
 save();render();}
async function gCancel(){try{await sb.auth.signOut();}catch(e){}S.ui.grole=null;save();render();}
/* ---- ADMIN (v2.2.0) ---- */
let ADMIN={on:false,otp:false,data:null,view:null};
function isAdminEmail(e){return (e||'').trim().toLowerCase()==='adm@fit.com';}
function vAdminOtp(){return `<div class="login-wrap"><div class="card" style="text-align:center;border:none;background:#3c3c3c;color:#fff;padding:24px 16px"><div style="font-size:40px">🛡</div><div style="font-size:20px;font-weight:900;margin-top:6px">Administración</div><div class="cap" style="color:rgba(255,255,255,.85);margin-top:4px">Segundo factor: ingresá el código de acceso.</div></div><div class="card"><input class="in" id="admOtp" type="tel" inputmode="numeric" maxlength="4" placeholder="····" style="text-align:center;font-size:24px;letter-spacing:10px" oninput="if(this.value.length===4)tryAdminOtp()" onkeydown="if(event.key==='Enter')tryAdminOtp()"/><button class="btn" style="margin-top:10px" onclick="tryAdminOtp()">Verificar →</button><button class="back" style="margin-top:10px" onclick="logout()">Cancelar</button></div></div>`;}
function tryAdminOtp(){if((val('admOtp')||'').trim()==='0602'){ADMIN.otp=true;render();adminLoad();}else{toast('Código de acceso incorrecto');const i=document.getElementById('admOtp');if(i){i.value='';i.focus();}}}
async function adminLoad(){if(!sb)return;const {data,error}=await sb.rpc('admin_overview');
 if(error||!data||!data.ok){toast('Error cargando datos: '+((data&&data.error)||(error&&error.message)||''));return;}
 ADMIN.data=data;
 try{const {data:rq}=await sb.from('v1_notifs').select('*').eq('trainer_uid',ADMIN_UID).order('id',{ascending:false}).limit(30);ADMIN.reqs=rq||[];}catch(e){ADMIN.reqs=[];}
 render();}
async function adminReqDone(id){try{await sb.from('v1_notifs').update({read:true}).eq('id',id);}catch(e){}adminLoad();}
function admStat(st){if(!st)return '';const logs=(st.logs||[]);const last=logs.length?logs.map(l=>l.date).sort().slice(-1)[0]:null;return logs.length+' entrenos'+(last?' · último '+fmt(last):'');}
function vAdminHome(){
 const D=ADMIN.data;
 if(ADMIN.view&&ADMIN.view.s)return vAdminStudent();
 const ts=(D.trainers||[]).map(t=>`<div class="stu"><div class="ico" style="width:38px;height:38px;font-size:18px;background:#20203A;border-radius:50%;display:flex;align-items:center;justify-content:center">🏋️</div><div style="flex:1"><div class="name">${esc(t.name)} ${t.disabled?'<span class="pill r">desactivado</span>':''}</div><div class="sub">${esc(t.email||'sin email')}</div><div class="sub">🔑 ${esc(t.code||'—')} · 👥 ${t.alumnos} alumno(s) · 📍 ${esc((t.publico&&t.publico.zona)||'—')}</div></div><div style="display:flex;flex-direction:column;gap:5px"><button class="btn sec sm" style="width:auto;margin:0;padding:6px 9px" onclick="adminToggleTrainer('${t.uid}',${t.disabled?'false':'true'})">${t.disabled?'▶ Activar':'⏸ Desactivar'}</button><button class="btn sec sm" style="width:auto;margin:0;padding:6px 9px;color:var(--red)" onclick="adminDelTrainer('${t.uid}','${esc(t.name)}')">🗑 Borrar</button></div></div>`).join('')||'<div class="empty cap">Sin entrenadores registrados.</div>';
 const ss=(D.students||[]).map(r=>{const st=r.student||{};const act=st.active!==false;return `<div class="stu" onclick="ADMIN.view={s:'${r.id}'};render()"><span class="dot ${act?(r.pending?'y':'g'):'r'}"></span><div style="flex:1"><div class="name">${esc(st.name||'—')} ${r.pending?'<span class="pill y">pendiente</span>':''} ${!act?'<span class="pill r">inactivo</span>':''}</div><div class="sub">${esc(r.email||'sin email')}</div><div class="sub">Profe: ${esc(r.trainer||st.trainerName||'—')} · ${admStat(st)}</div></div><span class="cap">ver →</span></div>`;}).join('')||'<div class="empty cap">Sin alumnos registrados.</div>';
 const reqs=(ADMIN.reqs||[]).filter(r=>!r.read);
 const rqs=reqs.length?`<div class="card" style="border-color:#6B5A1E;background:#211C10"><div class="h" style="margin:0 0 8px">📨 Solicitudes de activación (${reqs.length})</div>${reqs.map(r=>`<div style="padding:7px 0;border-bottom:1px solid #eadfc8"><div style="font-size:13px;font-weight:700">${esc(r.text)}</div><div class="cap">${(r.created_at||'').slice(0,10)}</div><button class="btn sec sm" style="margin-top:5px;width:auto;padding:6px 10px" onclick="adminReqDone(${r.id})">✓ Resuelto</button></div>`).join('')}</div>`:'';
 return `<div class="card" style="background:#3c3c3c;color:#fff;border:none"><div style="font-size:18px;font-weight:900">🛡 Panel de administración</div><div class="cap" style="color:rgba(255,255,255,.85);margin-top:4px">${(D.trainers||[]).length} entrenador(es) · ${(D.students||[]).length} alumno(s)</div><button class="btn sec sm" style="margin-top:10px" onclick="adminLoad()">🔄 Actualizar datos</button></div>${rqs}
 <div class="h">Entrenadores (${(D.trainers||[]).length})</div>${ts}
 <div class="h" style="margin-top:16px">Alumnos (${(D.students||[]).length})</div>${ss}`;
}
function vAdminStudent(){
 const D=ADMIN.data;const r=(D.students||[]).find(x=>x.id===ADMIN.view.s);if(!r){ADMIN.view=null;return vAdminHome();}
 const st=r.student||{};const act=st.active!==false;const ms=st.measures||[];const m0=ms[0],m1=ms[ms.length-1];
 const logs=(st.logs||[]);const last=logs.length?logs.map(l=>l.date).sort().slice(-1)[0]:null;
 const row=(k,v)=>`<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line)"><span class="cap">${k}</span><b style="font-size:14px">${v}</b></div>`;
 return `<button class="back" onclick="ADMIN.view=null;render()">← Panel</button>
 <div class="card"><div class="row"><div><div style="font-size:18px;font-weight:900">${esc(st.name||'—')}</div><div class="sub">${esc(r.email||'sin email')}</div></div>${act?'<span class="pill g">activo</span>':'<span class="pill r">inactivo</span>'}</div></div>
 <div class="card"><div class="h" style="margin:0 0 6px">Perfil</div>${row('Profe',esc(r.trainer||st.trainerName||'—'))}${row('Género / Edad',esc(st.genero||'—')+' / '+(st.edad||'—'))}${row('Objetivo',esc(st.objetivo||'—')+' · '+esc(st.nivel||'—')+' · '+(st.dias||'—')+' días/sem')}${row('Zona',esc(st.zona||'—'))}${row('Estado',r.pending?'📨 solicitud pendiente':'conectado')}</div>
 <div class="card"><div class="h" style="margin:0 0 6px">Avances</div>${row('Entrenos totales',logs.length)}${row('Último entreno',last?fmt(last):'nunca')}${row('Check-ins',(st.checkins||[]).length)}${row('Peso',(m0&&m0.peso?m0.peso+' kg':'—')+' → '+(m1&&m1.peso?m1.peso+' kg':'—'))}${row('Mediciones',ms.length)}${row('Fotos',(st.photos||[]).length)}</div>
 <div class="card"><div class="h" style="margin:0 0 6px">Acciones</div><button class="btn sec sm" onclick="adminRenameStudent('${r.id}','${esc(st.name||'')}')">✏️ Cambiar nombre</button><button class="btn sec sm" style="margin-top:6px" onclick="adminToggleStudent('${r.id}',${act?'false':'true'})">${act?'⏸ Desactivar':'▶ Activar'}</button><button class="btn sec sm" style="margin-top:6px;color:var(--red)" onclick="adminDelStudent('${r.id}','${esc(st.name||'')}')">🗑 Borrar usuario</button></div>`;
}
async function adminToggleStudent(id,act){const {data}=await sb.rpc('admin_set_student_active',{p_id:id,p_active:act});if(data&&data.ok){toast(act?'Alumno activado ▶':'Alumno desactivado ⏸');adminLoad();}else toast('Error');}
async function adminDelStudent(id,name){if(!confirm('¿Borrar DEFINITIVAMENTE a '+name+'? Se elimina su ficha, su historia y su cuenta de acceso.'))return;const {data}=await sb.rpc('admin_delete_student',{p_id:id});if(data&&data.ok){toast('Usuario borrado 🗑');ADMIN.view=null;adminLoad();}else toast('Error');}
async function adminToggleTrainer(uid,dis){const {data}=await sb.rpc('admin_set_trainer_disabled',{p_uid:uid,p_disabled:dis});if(data&&data.ok){toast(dis?'Profe desactivado ⏸ (sale del directorio)':'Profe activado ▶');adminLoad();}else toast('Error');}
async function adminDelTrainer(uid,name){if(!confirm('¿Borrar DEFINITIVAMENTE a '+name+'? Se elimina su cuenta, su perfil y TODOS sus alumnos.'))return;const {data}=await sb.rpc('admin_delete_trainer',{p_uid:uid});if(data&&data.ok){toast('Entrenador borrado 🗑');adminLoad();}else toast('Error');}
async function adminRenameStudent(id,cur){const v=prompt('Nuevo nombre:',cur);if(!v||!v.trim())return;const {data}=await sb.rpc('admin_rename',{p_kind:'al',p_id:id,p_name:v.trim()});if(data&&data.ok){toast('Nombre actualizado ✏️');adminLoad();}else toast('Error');}
S=load();
const QCODE=(function(){try{return new URLSearchParams(location.search).get('code');}catch(e){return null;}})();
if(QCODE&&!S.user){S.ui.ob={kind:'al',step:2,d:{path:'code',code:QCODE}};try{history.replaceState(null,'',location.pathname);}catch(e){}}
render();
initGate();
if(QCODE&&!S.user&&S.ui.ob&&S.ui.ob.step===2){setTimeout(function(){if(S.ui.ob&&S.ui.ob.kind==='al'&&S.ui.ob.step===2)checkCode();},700);}
if(sb){sb.auth.getSession().then(({data})=>{if(data&&data.session){const u=data.session.user;
 if(isAdminEmail(u.email)){ADMIN={on:true,otp:false,data:null,view:null};render();}
 else{cloudBoot(u).then(ok=>{if(!ok){S.user=null;S.ui.ob=null;S.ui.grole={name:(u.user_metadata&&(u.user_metadata.full_name||u.user_metadata.name))||'',email:u.email||''};save();render();}});}
}}).catch(()=>{});}
</script>
</body>
