<style>

  .vph iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

  .big{font-size:34px;font-weight:900;}.cap{font-size:12px;color:var(--muted);font-weight:600;}
  .back{background:none;border:none;color:var(--blue);font-weight:800;font-size:14px;padding:0;margin-bottom:10px;cursor:pointer;}
  .tag{font-size:11px;color:var(--muted);font-weight:600;}
  .empty{text-align:center;color:var(--muted);padding:34px 16px;}

  #gate.bye{opacity:0;pointer-events:none;}
  .gName{font-size:40px;font-weight:900;color:#fff;letter-spacing:1px;animation:gPop .9s ease-out both,gFloat 2.4s ease-in-out 1s infinite;}
  .gIco{font-size:54px;animation:gPop .7s ease-out both,gFloat 2.4s ease-in-out 1s infinite;}
  .gSub{color:rgba(255,255,255,.92);font-size:13px;font-weight:800;margin-top:12px;letter-spacing:.6px;text-transform:uppercase;animation:gPop 1.6s ease-out both;}
  .gCard{max-width:340px;margin:0 auto;color:#fff;animation:gPop .6s ease-out both;}
  .gCard p{font-size:14px;line-height:1.5;color:rgba(255,255,255,.95);font-weight:600;}

  .gBtn{display:block;width:100%;background:#fff;color:var(--blue2);border:none;border-radius:16px;padding:14px;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;cursor:pointer;margin-top:12px;box-shadow:0 4px 0 rgba(0,0,0,.22);}

  @keyframes gPop{0%{opacity:0;transform:scale(.7) translateY(24px)}60%{opacity:1;transform:scale(1.06)}100%{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes gFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  /* ---- Instalar como app (A2HS) ---- */
  #a2hs{position:fixed;inset:0;z-index:120;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.45);opacity:0;transition:opacity .3s;}

  .a2t{font-size:20px;font-weight:900;text-align:center;color:var(--ink);}
  .a2s{font-size:14px;font-weight:600;color:var(--muted);text-align:center;margin-top:6px;line-height:1.5;}
  .a2steps{margin:16px 0 4px;padding:0;list-style:none;}
  .a2steps li{display:flex;align-items:center;gap:12px;padding:10px 12px;border:2px solid var(--line);border-bottom-width:3px;border-radius:14px;margin-bottom:8px;font-size:14px;font-weight:700;color:var(--ink);}

  .a2dismiss{display:block;width:100%;background:none;border:none;color:var(--muted);font-weight:800;font-size:13px;padding:12px 0 2px;cursor:pointer;text-align:center;}
</style>

  });

function weekKey(ds){const d=new Date(ds);const on=new Date(d);on.setDate(d.getDate()-((d.getDay()+6)%7));return on.toISOString().slice(0,10);}
function streak(st){const wk=new Set(st.logs.map(l=>weekKey(l.date)));let n=0,d=new Date();for(;;){if(wk.has(weekKey(d.toISOString().slice(0,10)))){n++;d.setDate(d.getDate()-7);}else break;}return n;}
function progress(st,exId){return st.logs.filter(l=>l.entries.some(e=>e.exerciseId===exId)).map(l=>{const e=l.entries.find(x=>x.exerciseId===exId);return{date:l.date,kg:Math.max(...e.sets.map(s=>+s.kg||0))};}).sort((a,b)=>a.date<b.date?-1:1);}

function activeWorkoutFor(st,day){
  if(!st||!day)return null;
  let w=st.activeWorkout;
  if(w&&w.dayId===day.id)return w;
  if(w)return null;
  const legacyUi=S.ui.workout;
  const legacyIx=(st.logs||[]).findIndex(l=>l.date===today()&&!l.completedAt&&(l.entries||[]).some(en=>day.exercises.some(ex=>ex.id===en.exerciseId)));
  if(legacyUi&&legacyUi.sid===st.id&&legacyUi.dayId===day.id){
    const legacy=legacyIx>=0?st.logs.splice(legacyIx,1)[0]:null;
    w=st.activeWorkout={dayId:day.id,date:(legacy&&legacy.date)||legacyUi.date||today(),startedAt:(legacy&&legacy.startedAt)||new Date().toISOString(),entries:(legacy&&legacy.entries)||[],feel:(legacy&&legacy.feel)||'',note:(legacy&&legacy.note)||''};
    delete S.ui.workout;save();return w;
  }
  if(legacyIx>=0){
    const legacy=st.logs.splice(legacyIx,1)[0];
    w=st.activeWorkout={dayId:day.id,date:legacy.date,startedAt:legacy.startedAt||new Date().toISOString(),entries:legacy.entries||[],feel:legacy.feel||'',note:legacy.note||''};
    save();return w;
  }
  return null;
}

function lineChart(pts){
  if(pts.length<2)return '<div class="cap" style="padding:12px 4px">Registrá al menos 2 entrenos para ver la evolución.</div>';
  const W=380,H=130,p=26,xs=pts.map((_,i)=>p+i*(W-2*p)/(pts.length-1));
  const ys=pts.map(d=>d.kg),mn=Math.min(...ys),mx=Math.max(...ys),rg=(mx-mn)||1,Y=v=>H-p-(v-mn)/rg*(H-2*p);
  const d=pts.map((pt,i)=>(i?'L':'M')+xs[i].toFixed(0)+' '+Y(pt.kg).toFixed(0)).join(' ');
  const dots=pts.map((pt,i)=>`<circle cx="${xs[i].toFixed(0)}" cy="${Y(pt.kg).toFixed(0)}" r="3.5" style="fill:var(--blue)"/><text x="${xs[i].toFixed(0)}" y="${(Y(pt.kg)-8).toFixed(0)}" font-size="10" fill="#737373" text-anchor="middle">${pt.kg}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}"><path d="${d}" fill="none" style="stroke:var(--blue)" stroke-width="2.5"/>${dots}</svg>`;
}
function barChart(data){
  const W=380,H=120,p=22,bw=54,mx=Math.max(1,...data.map(d=>d.c));
  const bars=data.map((d,i)=>{const x=p+i*((W-2*p)/data.length)+8,h=(d.c/mx)*(H-2*p),y=H-p-h;
    return `<rect x="${x}" y="${y.toFixed(0)}" width="${bw}" height="${h.toFixed(0)}" rx="6" style="fill:var(--green)"/><text x="${x+bw/2}" y="${H-6}" font-size="11" fill="#737373" text-anchor="middle">${d.k}</text><text x="${x+bw/2}" y="${(y-5).toFixed(0)}" font-size="11" fill="#3c3c3c" text-anchor="middle" font-weight="700">${d.c}</text>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}">${bars}</svg>`;
}

function _norm(s){return (s==null?'':s.toString()).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9°+\/ -]/g,' ').replace(/\s+/g,' ').trim();}
var EX_MAP=[
 [/sentadilla|prensa|zancad|estocad|hip ?tr|gluteo|aductor|abductor|sillon|cuadriceps|femoral|peso muerto|sumo|step ?up|subida.*cajon|gemelo|pantorrilla|patada|buen ?d|buenos ?dias|goblet|unipodal|extension.*cuad/,'Piernas'],
 [/dominad|jalon|remo|traccion|espalda|dorsal|pull ?over|pullover/,'Espalda'],
 [/press (plano|banca|recto|inclinad|de pecho)|peck ?fl|pec ?fl|apertura|fondos|flexion|pecho/,'Pecho'],
 [/hombro|militar|elevaci|vuelo|deltoide|arnold|paloff|face ?pull|pajaro/,'Hombros'],
 [/curl|biceps|triceps|frances|martillo|copa/,'Brazos'],
 [/abdominal|plancha|core|oblicuo|obvlicuo|rusa|russian|rotacion|crunch|rueda|banco romano|abs/,'Core'],
 [/cinta|cardio|bici|eliptic|soga|hiit|\bhit\b|correr|trote|caminata|escalador/,'Cardio']
];
function mapCat(name){var n=_norm(name);for(var i=0;i<EX_MAP.length;i++){if(EX_MAP[i][0].test(n))return EX_MAP[i][1];}return null;}
function parseSeries(v){if(v==null)return null;if(typeof v==='number')return Math.round(v)||null;var m=(''+v).match(/\d+/);return m?parseInt(m[0],10):null;}
function parseRepsNum(v){if(v==null)return 10;if(typeof v==='number')return Math.round(v)||10;var s=(''+v).toLowerCase();var mx=s.match(/x\s*(\d{1,3})/);if(mx)return parseInt(mx[1],10);var nums=(s.match(/\d{1,3}/g)||[]).map(Number).filter(function(n){return n>0&&n<=30;});return nums.length?nums[0]:10;}
function dayHeader(a){var n=_norm(a);var m=n.match(/^dia\s*(\d+)\s*[-·:]?\s*(.*)$/);if(!m)return null;var desc=(a.toString().replace(/^\s*d[ií]a\s*\d+\s*[-·:]?\s*/i,'')).trim();return {num:parseInt(m[1],10),desc:desc};}
function isColHeader(a,b){var n=_norm(a);return n==='ejercicio'||(n.indexOf('ejercicio')===0&&/serie/.test(_norm(b)));}
function parseRoutineRows(rows){
  var meta={},days=[],cur=null,review=[],total=0;
  for(var i=0;i<rows.length;i++){var row=rows[i]||[];var a=row[0];
    if(a!=null&&!cur){var na=_norm(a);
      if(na.indexOf('nombre y apellido')>=0)meta.nombre=(row[1]!=null?(''+row[1]).trim():'');
      else if(na.indexOf('objetivo')>=0&&!dayHeader(a))meta.objetivo=(row[1]!=null?(''+row[1]).trim():'');
      else if(na.indexOf('dias de entrenamiento')>=0)meta.dias=parseSeries(row[1]);}
    var dh=dayHeader(a);
    if(dh){cur={num:dh.num,name:'Día '+dh.num+(dh.desc?(' · '+dh.desc):''),exercises:[]};days.push(cur);continue;}
    if(!cur)continue; if(a==null)continue; if(isColHeader(a,row[1]))continue;
    var name=(''+a).trim(); if(!name)continue;
    var sets=parseSeries(row[1]); var repsRaw=(row[2]!=null)?(''+row[2]).trim():''; var carga=row[3]; var nota=(row[5]!=null)?(''+row[5]).trim():'';
    var cat=mapCat(name); var recognized=!!cat; var weight=(typeof carga==='number')?carga:0;
    if(carga!=null&&typeof carga!=='number'&&!nota)nota=(''+carga).trim();
    cur.exercises.push({id:uid(),name:name,category:cat||'Otros',sets:(sets!=null?sets:3),reps:parseRepsNum(repsRaw),repsText:repsRaw,weight:weight,rest:90,note:nota,video:'',_recognized:recognized});
    total++;
    if(!recognized||sets==null)review.push({day:cur.name,name:name,why:(!recognized?'no reconocí el ejercicio':'no pude leer las series')});
  }
  days=days.filter(function(d){return d.exercises.length;});
  return {ok:(days.length>0&&total>0),meta:meta,days:days,total:total,review:review};
}
function loadXLSX(cb){if(window.XLSX)return cb();var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=function(){cb();};s.onerror=function(){cb('err');};document.head.appendChild(s);}
function importExcel(input,studentId){if(!canImportExcel()){return;}var f=input.files&&input.files[0];if(!f){return;}input.value='';toast('Leyendo Excel… ⏳');
  loadXLSX(function(err){
    if(err||!window.XLSX){toast('No pude cargar el lector de Excel. Probá de nuevo con conexión.');return;}
    var rd=new FileReader();
    rd.onload=function(e){try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
      var p=parseRoutineRows(rows);
      if(!p.ok){toast('No pude leer este Excel con el formato conocido. Por ahora el importador está calibrado para el formato de Lautaro.');return;}
      IMPORT={studentId:studentId,parsed:p};
      showImportSummary();
    }catch(ex){console.warn('importExcel',ex);toast('No pude leer el Excel. Revisá que sea el archivo correcto.');}};
    rd.onerror=function(){toast('No pude abrir el archivo.');};
    rd.readAsArrayBuffer(f);
  });
}

  var d=document.createElement('div');d.id='importOv';d.innerHTML=html;document.body.appendChild(d);

const HABIT_CATALOG=[['💧','Tomar 2L de agua'],['🚶','Caminar 8.000 pasos'],['😴','Dormir 7+ horas'],['🍗','Proteína en cada comida'],['🧘','Estirar 10 min'],['🥗','Comer saludable']];
function defaultHabits(){return HABIT_CATALOG.slice(0,4).map(h=>({id:uid(),emoji:h[0],name:h[1]}));}
function habitsOf(s){s.habits=s.habits||[];s.habitLog=s.habitLog||{};return s.habits;}
function habitDone(s,hid){return (s.habitLog[today()]||[]).includes(hid);}
function toggleHabit(hid){const s=me();habitsOf(s);const t=today();s.habitLog[t]=s.habitLog[t]||[];const i=s.habitLog[t].indexOf(hid);if(i>=0)s.habitLog[t].splice(i,1);else{s.habitLog[t].push(hid);if(s.habits.length&&s.habitLog[t].length===s.habits.length)notify(s.id,fn(s.name)+' completó todos sus hábitos de hoy ☑️');}save();render();}
function habitStreak(s){habitsOf(s);if(!s.habits.length)return 0;let n=0,i=(s.habitLog[today()]||[]).length>=s.habits.length?0:1;for(;;i++){const d=dOffset(-i);if((s.habitLog[d]||[]).length>=s.habits.length)n++;else break;}return n;}
function habitsCard(s){const hs=habitsOf(s);if(!hs.length)return '';const done=(s.habitLog[today()]||[]).length;const rows=hs.map(h=>`<div class="exrow" style="padding:9px 12px;margin-bottom:7px" onclick="toggleHabit('${h.id}')"><div class="ico" style="width:34px;height:34px;font-size:18px">${h.emoji}</div><div style="flex:1;font-weight:600;font-size:14px">${esc(h.name)}</div><div class="chk ${habitDone(s,h.id)?'done':''}">${habitDone(s,h.id)?'✓':''}</div></div>`).join('');const hsk=habitStreak(s);return `<div class="card" data-tour="habitos"><div class="row" style="margin-bottom:8px"><div class="h" style="margin:0">☑️ Hábitos de hoy · ${done}/${hs.length}</div>${hsk?`<span class="pill g">🔥 ${hsk} día(s)</span>`:''}</div>${rows}</div>`;}
function habitsEditorCard(s){const hs=habitsOf(s);const rows=HABIT_CATALOG.map(h=>{const on=hs.some(x=>x.name===h[1]);return `<button class="btn ${on?'':'sec'} sm" style="text-align:left;margin-bottom:6px" onclick="ptToggleHabit('${s.id}',${JSON.stringify(h[1]).replace(/"/g,'&quot;')})">${h[0]} ${h[1]} ${on?'✓':''}</button>`;}).join('');return `<div class="card"><div class="h" style="margin:0 0 6px">☑️ Hábitos diarios de ${esc(fn(s.name))}</div><div class="cap" style="margin:0 0 8px">El alumno los tilda cada día en su pantalla de inicio.</div>${rows}</div>`;}
function ptToggleHabit(id,nm){const s=S.students.find(x=>x.id===id);habitsOf(s);const i=s.habits.findIndex(h=>h.name===nm);const cat=HABIT_CATALOG.find(c=>c[1]===nm);if(i>=0)s.habits.splice(i,1);else s.habits.push({id:uid(),emoji:cat[0],name:nm});save();render();}
let CIFEEL='😐';

function checkinDue(s){const lc=lastCheckin(s);return !!s.profileDone&&(!lc||daysSince(lc.date)>=7);}

function progSuggestions(s){const rt=routineOf(s);if(!rt)return [];const out=[];allEx(rt).forEach(e=>{if(!e.weight)return;const sess=s.logs.filter(l=>l.entries.some(en=>en.exerciseId===e.id)).sort((a,b)=>a.date<b.date?-1:1).slice(-2);if(sess.length<2)return;const ok=sess.every(l=>{const en=l.entries.find(x=>x.exerciseId===e.id);return en.sets.length&&en.sets.every(x=>(+x.reps||0)>=e.reps&&(+x.kg||0)>=e.weight);});if(ok)out.push({ex:e,next:Math.round((e.weight+Math.max(2.5,e.weight*0.05))*2)/2});});return out;}
function progCard(s){const ps=progSuggestions(s);if(!ps.length)return '';return `<div class="card" style="border-color:#2C5F2D;background:#0F1F12"><div class="h" style="margin:0 0 6px">📈 Sugerencias de progresión</div><div class="cap" style="margin:0 0 4px">Cumplió el objetivo completo las últimas 2 sesiones:</div>${ps.map(p=>`<div class="row" style="padding:6px 0;border-bottom:1px solid #dcefdf"><div><b>${esc(p.ex.name)}</b><div class="cap">${p.ex.sets}×${p.ex.reps} con ${p.ex.weight} kg ✓✓</div></div><button class="btn g sm" style="width:auto;margin:0" onclick="applyProg('${s.id}','${p.ex.id}',${p.next})">↑ ${p.next} kg</button></div>`).join('')}</div>`;}
function applyProg(sid,exId,kg){const s=S.students.find(x=>x.id===sid);const e=findEx(routineOf(s),exId);if(!e)return;const old=e.weight;e.weight=kg;s.msgs=s.msgs||[];s.msgs.unshift({id:uid(),date:today(),text:'📈 ¡Subiste de nivel! Te ajusté '+e.name+' de '+old+' a '+kg+' kg. ¡A romperla!',read:false});pushTo({targetStudentId:sid,title:'📈 ¡Subiste de nivel!',body:'Tu profe te ajustó '+e.name+' a '+kg+' kg'});save();toast('Peso actualizado y alumno avisado 📈');render();}
function monthKey(ds){return ds.slice(0,7);}
function groupCard(s){const others=S.students.filter(x=>x.id!==s.id&&x.logs.length);if(!others.length)return '';
 const mk=monthKey(today());const rank=S.students.map(x=>({n:fn(x.name),me:x.id===s.id,c:x.logs.filter(l=>monthKey(l.date)===mk).length})).sort((a,b)=>b.c-a.c).slice(0,3);const medals=['🥇','🥈','🥉'];

 return `<div class="card"><div class="h" style="margin:0 0 8px">👥 Tu grupo</div><div class="cap" style="margin:0 0 6px">Ranking del mes</div>${rank.map((r,i)=>`<div class="row" style="padding:4px 0"><span>${medals[i]||'·'} ${esc(r.n)}${r.me?' <b>(vos)</b>':''}</span><span class="cap">${r.c} entrenos</span></div>`).join('')}<div class="cap" style="margin:10px 0 6px">Actividad de tus compañeros</div>${feed.map(f=>`<div class="row" style="padding:6px 0;border-top:1px solid var(--line)"><div><b>${esc(fn(f.x.name))}</b> entrenó ${fmt(f.l.date)} ${f.l.feel||''}<div class="cap">${f.l.entries.length} ejercicio(s)${f.l.claps?' · 👏 '+f.l.claps:''}</div></div><button class="btn sec sm" style="width:auto;margin:0" onclick="clap('${f.x.id}','${f.l.date}')">👏</button></div>`).join('')}</div>`;}

function finishWorkout(dayId){const s=me(),rt=routineOf(s),day=rt&&rt.days.find(d=>d.id===dayId),w=activeWorkoutFor(s,day);if(!w){toast('No hay un entrenamiento en curso');return;}const done=(w.entries||[]).length,total=day.exercises.length;if(!done){toast('Registrá al menos un ejercicio antes de finalizar');return;}if(!confirm('¿Finalizar el día de entrenamiento?\n\nGuardaste '+done+' de '+total+' ejercicios. Una vez finalizado se cerrará esta sesión.'))return;const log={date:w.date||today(),dayId:dayId,startedAt:w.startedAt||new Date().toISOString(),completedAt:new Date().toISOString(),entries:w.entries||[],feel:w.feel||'',note:(w.note||'').trim()};s.logs=s.logs||[];s.logs.push(log);delete s.activeWorkout;delete S.ui.workout;try{logEvent('action','finish_workout',{dayId:dayId,done:done,total:total});}catch(e){}const comments=(log.entries||[]).filter(en=>en.comment).length;notify(s.id,fn(s.name)+' finalizó '+day.name+' ('+done+'/'+total+' ejercicios)'+(log.feel?' y se sintió '+log.feel:'')+(comments?' · dejó '+comments+' comentario(s)':'')+(log.note?' · nota: “'+log.note.slice(0,100)+'”':''));save();toast('¡Día de entrenamiento finalizado! ✅');go('al_days');}

  <div class="card"><div class="h" style="margin:0 0 6px">🚪 Embudo: visita → registro → activo</div>
   ${_frow('👀 Visitantes únicos',_vis,null)}
   ${_frow('📝 Se registraron (cuenta)',EM.registrados,_vis?Math.round((EM.registrados||0)/_vis*100):0)}
   ${_frow('💪 Activos (registran entreno)',EM.activos,_vis?Math.round((EM.activos||0)/_vis*100):0)}
   <div class="cap" style="margin-top:6px">Entran muchos y se registran pocos → conversión. Se registran pero no quedan activos → activación.</div></div>`;
 return `<button class="back" onclick="ADMIN.view=null;render()">← Admin</button>
  <div class="row" style="align-items:center"><div class="h" style="flex:1;margin:0">📊 Tablero de uso</div><button class="btn sec sm" style="width:auto;margin:0" onclick="adminLoadDash(${dd})">🔄 Refrescar</button></div>
  <div class="cap" style="margin:6px 4px">Últimos ${dd} días · ${['7','14','30'].map(d=>`<a onclick="adminLoadDash(${d})" style="color:var(--blue);cursor:pointer;font-weight:800;margin-right:10px">${d}d</a>`).join('')}</div>
  <div class="flex" style="gap:8px;margin-bottom:10px">${kpi(t.eventos,'eventos')}${kpi(t.usuarios,'usuarios')}${kpi(t.sesiones,'sesiones')}${kpi(t.errores,'errores')}</div>
  ${trafficCards}
  <div class="card"><div class="h" style="margin:0 0 8px">Eventos por día</div><div class="flex" style="align-items:flex-end;gap:3px;height:120px">${bars}</div></div>
  <div class="card"><div class="h" style="margin:0 0 6px">Por categoría</div><div>${cat||'<span class="cap">—</span>'}</div><div class="h" style="margin:10px 0 6px">Por rol</div><div>${rol||'<span class="cap">—</span>'}</div></div>
  <div class="card"><div class="h" style="margin:0 0 8px">Acciones/pantallas más usadas</div>${top}</div>
  <div class="card"><div class="h" style="margin:0 0 8px">Errores recientes</div>${errs}</div>`;}


function admStat(st){if(!st)return '';const logs=(st.logs||[]);const last=logs.length?logs.map(l=>l.date).sort().slice(-1)[0]:null;return logs.length+' entrenos'+(last?' · último '+fmt(last):'');}
function admHasRt(r){return (r&&r.hasPlan!==undefined)?!!r.hasPlan:!!(r&&r.student&&r.student.routineId);}
function vAdminHome(){
 const D=ADMIN.data;
 if(ADMIN.view&&ADMIN.view.t)return vAdminTrainer();
 if(ADMIN.view&&ADMIN.view.dash)return vAdminDash();
 if(ADMIN.view&&ADMIN.view.s)return vAdminStudent();
 const ts=(D.trainers||[]).map(t=>`<div class="stu"><div class="ico" style="width:38px;height:38px;font-size:18px;background:#20203A;border-radius:50%;display:flex;align-items:center;justify-content:center">🏋️</div><div style="flex:1;cursor:pointer" onclick="openAdminTrainer('${t.uid}')"><div class="name">${esc(t.name)} ${t.disabled?'<span class="pill r">desactivado</span>':''}</div><div class="sub">${esc(t.email||'sin email')}</div><div class="sub">🔑 ${esc(t.code||'—')} · 👥 ${t.alumnos} alumno(s) · 📍 ${esc((t.publico&&t.publico.zona)||'—')}</div></div><div style="display:flex;flex-direction:column;gap:5px"><button class="btn sec sm" style="width:auto;margin:0;padding:6px 9px" onclick="adminToggleTrainer('${t.uid}',${t.disabled?'false':'true'})">${t.disabled?'▶ Activar':'⏸ Desactivar'}</button><button class="btn sec sm" style="width:auto;margin:0;padding:6px 9px;color:var(--red)" onclick="adminDelTrainer('${t.uid}','${esc(t.name)}')">🗑 Borrar</button></div></div>`).join('')||'<div class="empty cap">Sin entrenadores registrados.</div>';
 const _allstu=(D.students||[]);const _trs=[...new Set(_allstu.map(function(r){return r.trainer||(r.student&&r.student.trainerName)||'—';}))].sort();const _flt=ADMIN.stuFilter||'';const _fstu=_flt?_allstu.filter(function(r){return (r.trainer||(r.student&&r.student.trainerName)||'—')===_flt;}):_allstu;const stuFilterSel='<select class="in" style="margin:0 0 10px;text-align:left" onchange="ADMIN.stuFilter=this.value;render()"><option value=""'+(_flt?'':' selected')+'>Todos los profes ('+_allstu.length+')</option>'+_trs.map(function(n){return '<option value="'+esc(n)+'"'+(_flt===n?' selected':'')+'>'+esc(n)+' ('+_allstu.filter(function(r){return (r.trainer||(r.student&&r.student.trainerName)||'—')===n;}).length+')</option>';}).join('')+'</select>';const ss=_fstu.map(r=>{const st=r.student||{};const act=st.active!==false;return `<div class="stu" onclick="ADMIN.view={s:'${r.id}'};render()"><span class="dot ${act?(r.pending?'y':'g'):'r'}"></span><div style="flex:1"><div class="name">${esc(st.name||'—')} ${r.pending?'<span class="pill y">pendiente</span>':''} ${!act?'<span class="pill r">inactivo</span>':''} ${(!r.pending)?(admHasRt(r)?'<span class="pill g">con rutina</span>':'<span class="pill y">sin rutina</span>'):''}</div><div class="sub">${esc(r.email||'sin email')}</div><div class="sub">Profe: ${esc(r.trainer||st.trainerName||'—')} · ${admStat(st)}</div></div><span class="cap">ver →</span></div>`;}).join('')||('<div class="empty cap">Sin alumnos'+(_flt?' de '+esc(_flt):' registrados')+'.</div>');
 const reqs=(ADMIN.reqs||[]).filter(r=>!r.read);
 const rqs=reqs.length?`<div class="card" style="border-color:#6B5A1E;background:#211C10"><div class="h" style="margin:0 0 8px">📨 Solicitudes de activación (${reqs.length})</div>${reqs.map(r=>`<div style="padding:7px 0;border-bottom:1px solid #eadfc8"><div style="font-size:13px;font-weight:700">${esc(r.text)}</div><div class="cap">${(r.created_at||'').slice(0,10)}</div><button class="btn sec sm" style="margin-top:5px;width:auto;padding:6px 10px" onclick="adminReqDone(${r.id})">✓ Resuelto</button></div>`).join('')}</div>`:'';
 const _codes=(ADMIN.codes||[]).map(c=>{const est=c.active?'<span class="pill g">activo</span>':'<span class="pill r">inactivo</span>';const us=(c.max_uses?c.uses+'/'+c.max_uses:c.uses+'/∞');const ven=c.redeem_by?fmtDMY(c.redeem_by):'sin límite';return `<div class="stu"><div style="flex:1"><div class="name">${esc(c.code)} ${est}</div><div class="sub">Dura ${c.lifetime_days} días · usos ${us} · vence ${ven}</div></div><button class="btn sec sm" style="width:auto;margin:0 6px 0 0;padding:6px 9px" onclick="adminToggleCode(${c.id},${c.active?'false':'true'})">${c.active?'⏸':'▶'}</button><button class="btn sec sm" style="width:auto;margin:0;padding:6px 9px;color:var(--red)" onclick="adminDelCode(${c.id})">🗑</button></div>`;}).join('')||'<div class="empty cap">Todavía no hay códigos. Creá el primero arriba.</div>';
 const codesCard=`<div class="card"><div class="h" style="margin:0 0 8px">🎟️ Códigos de acceso anticipado</div><div class="cap" style="margin-bottom:8px">Creá códigos para los primeros que entran. Cada alumno que lo activa tiene acceso por los días que definas; el código sirve hasta su fecha de vencimiento o su límite de usos.</div><input class="in" id="acCode" placeholder="CÓDIGO (ej. VERANO26)" style="text-transform:uppercase"/><div class="flex" style="gap:8px;margin-top:6px"><div style="flex:1"><div class="cap">Dura (días)</div><input class="in" id="acDays" type="number" value="30"/></div><div style="flex:1"><div class="cap">Máx. usos (vacío=∞)</div><input class="in" id="acMax" type="number" placeholder="∞"/></div></div><div class="cap" style="margin-top:6px">Vence (último día para usarlo)</div><input class="in" id="acVence" type="date"/><button class="btn" onclick="adminCreateCode()" style="margin-top:8px">Crear código</button><div style="margin-top:12px">${_codes}</div></div>`;
  const _ads=(ADMIN.ads||[]).map(a=>`<div class="stu"><div style="flex:1"><div class="name" style="font-size:13px">${esc(a.texto)} ${a.active?'<span class="pill g">activo</span>':'<span class="pill r">off</span>'}</div><div class="sub">por ${esc(a.owner||'Plataforma')} · ${a.url?esc(a.url):'sin link'}${a.until?' · vence '+fmtDMY(a.until):''}</div></div><button class="btn sec sm" style="width:auto;margin:0 6px 0 0;padding:6px 9px" onclick="adminToggleAd(${a.id},${a.active?'false':'true'})">${a.active?'⏸':'▶'}</button><button class="btn sec sm" style="width:auto;margin:0;padding:6px 9px;color:var(--red)" onclick="adminDelAd(${a.id})">🗑</button></div>`).join('')||'<div class="empty cap">Sin anuncios.</div>';
 const adsCard=`<div class="card"><div class="h" style="margin:0 0 8px">📣 Publicidad (banner)</div><div class="cap" style="margin-bottom:8px">Se muestra chico y no intrusivo en el inicio de alumnos y profes.</div><input class="in" id="adTexto" placeholder="Texto del banner"/><input class="in" id="adUrl" placeholder="Link (opcional)" style="margin-top:6px"/><div class="flex" style="gap:8px;margin-top:6px"><div style="flex:1"><div class="cap">Color</div><input class="in" id="adColor" placeholder="#B98CFF"/></div><div style="flex:1"><div class="cap">Vence</div><input class="in" id="adVence" type="date"/></div></div><button class="btn" style="margin-top:8px" onclick="adminCreateAd()">Crear anuncio</button><div style="margin-top:12px">${_ads}</div></div>`;
 const _plansCfg=Object.keys(PLANS).map(function(k){var c=(ADMIN.plans||[]).find(function(p){return p.plan===k;})||{price:(k==='Pro'?9900:0),mp_link:''};return '<div style="padding:10px 0;border-bottom:1px solid var(--line)"><div class="name" style="font-size:14px">Plan '+esc(k)+' <span class="cap">('+PLANS[k].cap+' alumnos)</span></div><div style="margin-top:6px"><div class="cap">Precio $/mes (0 = gratis)</div><input class="in" id="pc_'+k+'_price" type="number" value="'+(c.price||0)+'"/></div><div class="cap" style="margin-top:6px">Link de pago MercadoPago</div><input class="in" id="pc_'+k+'_link" placeholder="https://mpago.la/..." value="'+esc(c.mp_link||'')+'"/><button class="btn sm" style="margin-top:8px" onclick="adminSavePlanCfg(\''+k+'\')">Guardar Plan '+esc(k)+'</button></div>';}).join('');
 const plansCfgCard=`<div class="card"><div class="h" style="margin:0 0 8px">💳 Planes y precios</div><div class="cap" style="margin-bottom:8px">Precio y link de cobro de MercadoPago por plan. El profe los ve al pedir upgrade; cuando paga, activás su plan desde su ficha.</div>${_plansCfg}</div>`;
 const gateOn=ADMIN.gateRequired!==false;
 const gateCard=`<div class="card"><div class="h" style="margin:0 0 8px">🚪 Puerta de acceso anticipado</div><div class="cap" style="margin-bottom:8px">${gateOn?'Estado: <b>Requiere código</b> al entrar (invite-only).':'Estado: <b style="color:#9bef6e">Abierta</b> — cualquiera entra sin código.'}</div><button class="btn${gateOn?'':' sec'}" style="margin:0" onclick="adminSetGate(${gateOn?'false':'true'})">${gateOn?'🔓 Abrir acceso (sin código)':'🔒 Volver a requerir código'}</button></div>`;
 return `<div class="card" style="background:#3c3c3c;color:#fff;border:none"><div style="font-size:18px;font-weight:900">🛡 Panel de administración</div><div class="cap" style="color:rgba(255,255,255,.85);margin-top:4px">${(D.trainers||[]).length} entrenador(es) · ${(D.students||[]).length} alumno(s)</div><button class="btn sec sm" style="margin-top:10px" onclick="adminLoad()">🔄 Actualizar datos</button> <button class="btn sec sm" style="margin-top:10px" onclick="openAdminDash()">📊 Tablero</button></div>${rqs}<div class="admin-settings-grid">${codesCard}${adsCard}${plansCfgCard}${gateCard}</div>
 <div class="admin-directory-grid"><section class="admin-directory-column"><div class="h">Entrenadores (${(D.trainers||[]).length})</div>${ts}</section>
 <section class="admin-directory-column"><div class="h">Alumnos (${_fstu.length}${_flt?' de '+_allstu.length:''})</div>${stuFilterSel}${(function(){var np=_fstu.filter(function(r){return !r.pending;});var cr=np.filter(admHasRt).length;return '<div class="cap" style="margin:0 0 10px">📋 '+cr+' con rutina · ⏳ '+(np.length-cr)+' sin rutina</div>';})()}${ss}</section></div>`;
}
function vAdminStudent(){
 const D=ADMIN.data;const r=(D.students||[]).find(x=>x.id===ADMIN.view.s);if(!r){ADMIN.view=null;return vAdminHome();}
 const st=r.student||{};const act=st.active!==false;const ms=st.measures||[];const m0=ms[0],m1=ms[ms.length-1];
 const logs=(st.logs||[]);const last=logs.length?logs.map(l=>l.date).sort().slice(-1)[0]:null;
 const row=(k,v)=>`<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line)"><span class="cap">${k}</span><b style="font-size:14px">${v}</b></div>`;
 return `<button class="back" onclick="ADMIN.view=null;render()">← Panel</button>
 <div class="card"><div class="row"><div><div style="font-size:18px;font-weight:900">${esc(st.name||'—')}</div><div class="sub">${esc(r.email||'sin email')}</div></div>${act?'<span class="pill g">activo</span>':'<span class="pill r">inactivo</span>'}</div></div>
 <div class="card"><div class="h" style="margin:0 0 6px">Perfil</div>${row('Profe',esc(r.trainer||st.trainerName||'—'))}${row('Género / Edad',esc(st.genero||'—')+' / '+(st.edad||'—'))}${row('Objetivo',esc(st.objetivo||'—')+' · '+esc(st.nivel||'—')+' · '+(st.dias||'—')+' días/sem')}${row('Zona',esc(st.zona||'—'))}${row('Estado',r.pending?'📨 solicitud pendiente':'conectado')}${row('Rutina',admHasRt(r)?'✅ asignada':'⏳ sin asignar')}</div>
 <div class="card"><div class="h" style="margin:0 0 6px">Avances</div>${row('Entrenos totales',logs.length)}${row('Último entreno',last?fmt(last):'nunca')}${row('Check-ins',(st.checkins||[]).length)}${row('Peso',(m0&&m0.peso?m0.peso+' kg':'—')+' → '+(m1&&m1.peso?m1.peso+' kg':'—'))}${row('Mediciones',ms.length)}${row('Fotos',(st.photos||[]).length)}</div>
 <div class="card"><div class="h" style="margin:0 0 6px">Acciones</div><button class="btn sec sm" onclick="adminRenameStudent('${r.id}','${esc(st.name||'')}')">✏️ Cambiar nombre</button><button class="btn sec sm" style="margin-top:6px" onclick="adminToggleStudent('${r.id}',${act?'false':'true'})">${act?'⏸ Desactivar':'▶ Activar'}</button><button class="btn sec sm" style="margin-top:6px;color:var(--red)" onclick="adminDelStudent('${r.id}','${esc(st.name||'')}')">🗑 Borrar usuario</button></div>`;
}
async function adminToggleStudent(id,act){const {data}=await sb.rpc('admin_set_student_active',{p_id:id,p_active:act});if(data&&data.ok){toast(act?'Alumno activado ▶':'Alumno desactivado ⏸');adminLoad();}else toast('Error');}
async function adminDelStudent(id,name){if(!confirm('¿Borrar DEFINITIVAMENTE a '+name+'? Se elimina su ficha, su historia y su cuenta de acceso.'))return;const {data}=await sb.rpc('admin_delete_student',{p_id:id});if(data&&data.ok){toast('Usuario borrado 🗑');ADMIN.view=null;adminLoad();}else toast('Error');}
async function adminToggleTrainer(uid,dis){const {data}=await sb.rpc('admin_set_trainer_disabled',{p_uid:uid,p_disabled:dis});if(data&&data.ok){toast(dis?'Profe desactivado ⏸ (sale del directorio)':'Profe activado ▶');adminLoad();}else toast('Error');}
async function adminDelTrainer(uid,name){if(!confirm('¿Borrar DEFINITIVAMENTE a '+name+'? Se elimina su cuenta, su perfil y TODOS sus alumnos.'))return;const {data}=await sb.rpc('admin_delete_trainer',{p_uid:uid});if(data&&data.ok){toast('Entrenador borrado 🗑');adminLoad();}else toast('Error');}
async function adminRenameStudent(id,cur){const v=prompt('Nuevo nombre:',cur);if(!v||!v.trim())return;const {data}=await sb.rpc('admin_rename',{p_kind:'al',p_id:id,p_name:v.trim()});if(data&&data.ok){toast('Nombre actualizado ✏️');adminLoad();}else toast('Error');}
S=load();
const QCODE=(function(){try{var c=new URLSearchParams(location.search).get('code');return (c&&c.length<=8)?c:null;}catch(e){return null;}})();
if(QCODE&&!S.user){S.ui.ob={kind:'al',step:2,d:{path:'code',code:QCODE}};try{history.replaceState(null,'',location.pathname);}catch(e){}}
render();
initGate();
if(QCODE&&!S.user&&S.ui.ob&&S.ui.ob.step===2){setTimeout(function(){if(S.ui.ob&&S.ui.ob.kind==='al'&&S.ui.ob.step===2)checkCode();},700);}
if(sb){sb.auth.getSession().then(({data})=>{if(data&&data.session){const u=data.session.user;
 if(isAdminEmail(u.email)){ADMIN={on:true,otp:false,data:null,view:null};render();}
 else{cloudBoot(u).then(ok=>{if(!ok){var ob=S.ui&&S.ui.ob;if(ob&&ob.kind==='al'&&ob.d&&ob.d.oauthWait){S.user=null;S.ui.grole=null;ob.d.oauth=true;ob.d.oauthWait=false;ob.d.email=u.email||ob.d.email||'';save();render();if(ob.d.path==='code')finishObCodeCloud();else if(ob.d.path==='new')finishObAlNewCloud();}else{S.user=null;S.ui.ob=null;S.ui.grole={name:(u.user_metadata&&(u.user_metadata.full_name||u.user_metadata.name))||'',email:u.email||''};save();render();}}});}
}}).catch(()=>{});}
</script>
